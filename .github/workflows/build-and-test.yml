name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (Release)
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: tests/NeversoftMultitool.Tests/bin/Release/net10.0/NeversoftMultitool.Tests.exe

  build-cli-cross-platform:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Build CLI (Linux)
      run: |
        dotnet build src/NeversoftMultitool/NeversoftMultitool.csproj \
          --configuration Release \
          --framework net10.0 \
          -p:TargetFrameworks=net10.0

    - name: Verify CLI builds on Linux
      run: |
        echo "CLI build successful on Linux"
